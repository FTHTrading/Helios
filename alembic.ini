# Alembic configuration for Helios OS

[alembic]
script_location = migrations
prepend_sys_path = .

# The URL is overridden at runtime from HeliosConfig.DATABASE_URL
# This fallback is only used if env.py doesn't set it.
sqlalchemy.url = sqlite:///data/helios.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
