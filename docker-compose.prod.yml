version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helios_secure_pw}
      POSTGRES_DB: helios
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Helios API (Flask + Gunicorn) ──────────────────────────────
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5050:5050"
    env_file:
      - .env.production
    environment:
      HELIOS_ENV: production
      HELIOS_DEBUG: "false"
      HELIOS_DATABASE_URL: postgresql://helios:${POSTGRES_PASSWORD:-helios_secure_pw}@db:5432/helios
      HELIOS_REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Celery Worker (Background Jobs) ────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      HELIOS_ENV: production
      HELIOS_DEBUG: "false"
      HELIOS_DATABASE_URL: postgresql://helios:${POSTGRES_PASSWORD:-helios_secure_pw}@db:5432/helios
      HELIOS_REDIS_URL: redis://redis:6379/0
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  # ─── Celery Beat (Scheduler) ────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      HELIOS_ENV: production
      HELIOS_DEBUG: "false"
      HELIOS_DATABASE_URL: postgresql://helios:${POSTGRES_PASSWORD:-helios_secure_pw}@db:5432/helios
      HELIOS_REDIS_URL: redis://redis:6379/0
    command: celery -A celery_app beat --loglevel=info

volumes:
  pgdata:
